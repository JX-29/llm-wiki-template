name: wiki-lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linter dependency
        run: pip install pyyaml
      - name: Lint wiki (broken links, frontmatter, orphans, staleness)
        run: python3 scripts/lint_wiki.py
